<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="leafGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:0.08" />
    </linearGradient>
    <linearGradient id="leafGradient2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.12" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:0.06" />
    </linearGradient>
  </defs>

  <!-- Large decorative leaf - top right -->
  <g opacity="0.4" transform="translate(650, 50) rotate(-25)">
    <path d="M 0 0 Q 30 -20 40 -50 Q 35 -30 30 0 Q 35 30 40 50 Q 30 20 0 0" 
          fill="url(#leafGradient)" stroke="#10b981" stroke-width="1.5" stroke-opacity="0.4"/>
    <line x1="0" y1="0" x2="40" y2="-50" stroke="#10b981" stroke-width="1" opacity="0.3"/>
  </g>

  <!-- Medium decorative leaf - bottom left -->
  <g opacity="0.35" transform="translate(80, 480) rotate(45)">
    <path d="M 0 0 Q 25 -15 35 -40 Q 30 -22 25 0 Q 30 22 35 40 Q 25 15 0 0" 
          fill="url(#leafGradient2)" stroke="#3b82f6" stroke-width="1.5" stroke-opacity="0.4"/>
    <line x1="0" y1="0" x2="35" y2="-40" stroke="#3b82f6" stroke-width="1" opacity="0.3"/>
  </g>

  <!-- Small decorative leaf - top left -->
  <g opacity="0.2" transform="translate(100, 120) rotate(-15)">
    <path d="M 0 0 Q 15 -10 22 -25 Q 18 -13 15 0 Q 18 13 22 25 Q 15 10 0 0" 
          fill="url(#leafGradient)" stroke="#10b981" stroke-width="1" stroke-opacity="0.3"/>
  </g>

  <!-- Small decorative leaf - bottom right -->
  <g opacity="0.2" transform="translate(720, 520) rotate(60)">
    <path d="M 0 0 Q 15 -10 22 -25 Q 18 -13 15 0 Q 18 13 22 25 Q 15 10 0 0" 
          fill="url(#leafGradient2)" stroke="#3b82f6" stroke-width="1" stroke-opacity="0.3"/>
  </g>

  <!-- Tea cup silhouette - subtle background -->
  <g opacity="0.08" transform="translate(600, 450) scale(1.2)">
    <ellipse cx="0" cy="0" rx="40" ry="12" fill="none" stroke="#111827" stroke-width="2"/>
    <path d="M -40 0 L -42 35 Q -42 40 -38 40 L 38 40 Q 42 40 42 35 L 40 0" 
          fill="none" stroke="#111827" stroke-width="2" stroke-linecap="round"/>
    <path d="M 45 5 Q 55 5 55 15 Q 55 25 45 25" 
          fill="none" stroke="#111827" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Decorative circles - production line inspired -->
  <g opacity="0.12">
    <circle cx="150" cy="100" r="35" fill="none" stroke="#3b82f6" stroke-width="1" stroke-dasharray="5,5"/>
    <circle cx="650" cy="200" r="50" fill="none" stroke="#10b981" stroke-width="1" stroke-dasharray="5,5"/>
    <circle cx="100" cy="350" r="40" fill="none" stroke="#3b82f6" stroke-width="1" stroke-dasharray="5,5"/>
  </g>

  <!-- Corner accent lines -->
  <g stroke="#10b981" stroke-width="1" opacity="0.15" stroke-linecap="round">
    <line x1="0" y1="0" x2="60" y2="0"/>
    <line x1="0" y1="0" x2="0" y2="60"/>
    <line x1="800" y1="600" x2="740" y2="600"/>
    <line x1="800" y1="600" x2="800" y2="540"/>
  </g>
</svg>
